<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Backoffice ETP - Connexion</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <main class="login-wrapper">
    <section class="login-shell" aria-label="Connexion backoffice">
      <div class="ring-decor" aria-hidden="true"></div>

      <article class="login-panel">
        <h1>Login</h1>
        <p class="subtitle">Accès administrateur ETP FORMATION</p>

        <form id="loginForm" novalidate>
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="email@exemple.com" required />

          <label for="password">Mot de passe</label>
          <div class="password-wrap">
            <input id="password" type="password" placeholder="********" required />
            <button type="button" id="togglePassword" class="toggle-password" aria-label="Afficher le mot de passe">👁</button>
          </div>

          <a href="#" class="forgot-link">Mot de passe oublié ?</a>
          <button type="submit">Se connecter</button>
        </form>

        <p id="msg" class="msg" aria-live="polite"></p>
        <a href="../index.html" class="back-link">← Retour au formulaire</a>
      </article>
    </section>
  </main>

  <script src="login.js"></script>
</body>
</html>
